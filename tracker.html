<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Day Reset</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea;
    --bg-deep: #ebe6dc;
    --ink: #1a1612;
    --ink-soft: #4a4238;
    --paper: #faf7f1;
    --accent: #c44536;
    --accent-deep: #8b2e24;
    --gold: #b08d57;
    --sage: #7a8b6f;
    --muted: #8a8073;
    --line: rgba(26, 22, 18, 0.12);
    --shadow: 0 1px 2px rgba(26,22,18,0.04), 0 8px 24px rgba(26,22,18,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', serif;
    min-height: 100vh;
    padding: 32px 20px 80px;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(196, 69, 54, 0.04), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(176, 141, 87, 0.05), transparent 50%);
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* HEADER */
  .masthead {
    text-align: center;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 32px;
    position: relative;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(48px, 11vw, 84px);
    line-height: 0.9;
    letter-spacing: -0.03em;
    font-variation-settings: "opsz" 144;
    margin-bottom: 8px;
  }

  h1 .italic {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .tagline {
    font-style: italic;
    font-size: 16px;
    color: var(--ink-soft);
    font-weight: 400;
    margin-top: 6px;
  }

  /* PROGRESS RING */
  .progress-block {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    background: var(--paper);
    padding: 20px;
    border-radius: 4px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    border: 1px solid var(--line);
  }

  .ring-wrap { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { stroke: var(--bg-deep); }
  .ring-fg { stroke: var(--accent); transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .ring-day { font-size: 26px; font-weight: 700; line-height: 1; font-variation-settings: "opsz" 144; }
  .ring-total { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.15em; margin-top: 2px; }

  .progress-meta { flex: 1; }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 13px;
  }
  .meta-row:last-child { border-bottom: none; }
  .meta-label { color: var(--ink-soft); font-style: italic; }
  .meta-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; }

  /* QUOTE */
  .quote {
    text-align: center;
    padding: 24px 16px;
    margin-bottom: 32px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .quote-text {
    font-style: italic;
    font-size: 18px;
    line-height: 1.4;
    color: var(--ink);
    font-weight: 400;
    font-variation-settings: "opsz" 144;
  }
  .quote-attr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 10px;
  }

  /* SECTION */
  .section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .section-label span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* HABITS */
  .habits {
    background: var(--paper);
    border-radius: 4px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    overflow: hidden;
    margin-bottom: 32px;
  }
  .habit {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .habit:last-child { border-bottom: none; }
  .habit:active { background: var(--bg-deep); }

  .checkbox {
    width: 26px;
    height: 26px;
    border: 1.5px solid var(--ink-soft);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .checkbox::after {
    content: '';
    width: 12px;
    height: 6px;
    border-left: 2px solid var(--paper);
    border-bottom: 2px solid var(--paper);
    transform: rotate(-45deg) translateY(-2px) scale(0);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .habit.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }
  .habit.done .checkbox::after { transform: rotate(-45deg) translateY(-2px) scale(1); }

  .habit-info { flex: 1; }
  .habit-name {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
    transition: color 0.3s;
  }
  .habit.done .habit-name {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--accent);
    text-decoration-thickness: 1.5px;
  }
  .habit-streak {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .habit-icon {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--gold);
    font-weight: 400;
  }

  /* METRICS */
  .metrics {
    background: var(--paper);
    border-radius: 4px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    padding: 20px;
    margin-bottom: 32px;
  }
  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .metric-field { display: flex; flex-direction: column; gap: 6px; }
  .metric-field.full { grid-column: 1 / -1; }
  .metric-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .metric-input {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 10px 12px;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    width: 100%;
    transition: border-color 0.2s;
    font-variation-settings: "opsz" 144;
  }
  .metric-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .metric-unit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* CALENDAR */
  .calendar {
    background: var(--paper);
    border-radius: 4px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    padding: 20px;
    margin-bottom: 32px;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .cal-day {
    aspect-ratio: 1;
    border: 1px solid var(--line);
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--bg);
    position: relative;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cal-day .num { font-weight: 500; }
  .cal-day .score {
    font-size: 8px;
    color: var(--muted);
    margin-top: 2px;
  }
  .cal-day.current {
    border-color: var(--accent);
    border-width: 2px;
    background: var(--paper);
  }
  .cal-day.perfect {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }
  .cal-day.perfect .score { color: rgba(250, 247, 241, 0.8); }
  .cal-day.flawless {
    background: var(--accent-deep);
    color: var(--paper);
    border-color: var(--gold);
    box-shadow: inset 0 0 0 1px var(--gold);
  }
  .cal-day.flawless::after {
    content: '★';
    position: absolute;
    top: 2px;
    right: 3px;
    font-size: 8px;
    color: var(--gold);
  }
  .cal-day.flawless .score { color: rgba(250, 247, 241, 0.8); }
  .cal-day.partial {
    background: linear-gradient(135deg, var(--gold) 0%, var(--paper) 100%);
  }
  .cal-day.done-some {
    background: var(--bg-deep);
  }
  .cal-day.future { opacity: 0.4; cursor: default; }

  /* FOOTER */
  .footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }
  .reset-btn {
    background: none;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    padding: 8px 16px;
    transition: color 0.2s;
  }
  .reset-btn:hover { color: var(--accent); }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .masthead { animation: fadeUp 0.6s ease-out both; }
  .progress-block { animation: fadeUp 0.6s ease-out 0.1s both; }
  .quote { animation: fadeUp 0.6s ease-out 0.2s both; }
  .habits { animation: fadeUp 0.6s ease-out 0.3s both; }
  .metrics { animation: fadeUp 0.6s ease-out 0.4s both; }
  .calendar { animation: fadeUp 0.6s ease-out 0.5s both; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  .habit.done .checkbox { animation: pulse 0.4s ease-out; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--ink);
    color: var(--paper);
    padding: 12px 24px;
    border-radius: 2px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.2);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 100;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* DATE NAV */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .nav-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-family: 'Fraunces', serif;
    font-size: 16px;
    color: var(--ink);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .date-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    min-width: 140px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">

  <header class="masthead">
    <div class="eyebrow">No. 01 · The Reset Edition</div>
    <h1>Thirty<br><span class="italic">days</span></h1>
    <div class="tagline">a quiet revolution, one day at a time</div>
  </header>

  <div class="date-nav">
    <button class="nav-btn" id="prevDay">‹</button>
    <div class="date-display" id="dateDisplay">—</div>
    <button class="nav-btn" id="nextDay">›</button>
  </div>

  <div class="progress-block">
    <div class="ring-wrap">
      <svg width="88" height="88" viewBox="0 0 88 88">
        <circle class="ring-bg" cx="44" cy="44" r="38" stroke-width="4" fill="none"/>
        <circle class="ring-fg" id="ringFg" cx="44" cy="44" r="38" stroke-width="4" fill="none" stroke-dasharray="238.76" stroke-dashoffset="238.76" stroke-linecap="round"/>
      </svg>
      <div class="ring-label">
        <div class="ring-day" id="currentDayNum">1</div>
        <div class="ring-total">/ 30</div>
      </div>
    </div>
    <div class="progress-meta">
      <div class="meta-row"><span class="meta-label">perfect days</span><span class="meta-value" id="perfectCount">0</span></div>
      <div class="meta-row"><span class="meta-label">flawless days</span><span class="meta-value" id="flawlessCount">0</span></div>
      <div class="meta-row"><span class="meta-label">current streak</span><span class="meta-value" id="streakCount">0</span></div>
      <div class="meta-row"><span class="meta-label">completion rate</span><span class="meta-value" id="completionRate">0%</span></div>
    </div>
  </div>

  <div class="quote">
    <div class="quote-text" id="quoteText">Discipline is choosing between what you want now and what you want most.</div>
    <div class="quote-attr" id="quoteAttr">Day 01</div>
  </div>

  <div class="section-label"><span>Today's Practice</span></div>
  <div class="habits" id="habitsList"></div>

  <div class="section-label"><span>Measurements</span></div>
  <div class="metrics">
    <div class="metrics-grid">
      <div class="metric-field">
        <label class="metric-label">Weight <span class="metric-unit">kg</span></label>
        <input type="number" step="0.1" class="metric-input" data-metric="weight" placeholder="—">
      </div>
      <div class="metric-field">
        <label class="metric-label">Muscle <span class="metric-unit">kg</span></label>
        <input type="number" step="0.1" class="metric-input" data-metric="muscle" placeholder="—">
      </div>
      <div class="metric-field">
        <label class="metric-label">Body Fat <span class="metric-unit">%</span></label>
        <input type="number" step="0.1" class="metric-input" data-metric="fat" placeholder="—">
      </div>
      <div class="metric-field">
        <label class="metric-label">Water <span class="metric-unit">%</span></label>
        <input type="number" step="0.1" class="metric-input" data-metric="water" placeholder="—">
      </div>
      <div class="metric-field full">
        <label class="metric-label">Note for the day</label>
        <input type="text" class="metric-input" data-metric="note" placeholder="How did it feel?">
      </div>
    </div>
  </div>

  <div class="section-label"><span>The Journey</span></div>
  <div class="calendar">
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="footer">
    <button class="reset-btn" id="resetBtn">Reset Journey</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const HABITS = [
    { id: 'sugar', name: 'No sugar', icon: '∅' },
    { id: 'alcohol', name: 'No alcohol', icon: '∅' },
    { id: 'flour', name: 'No flour', icon: '∅' },
    { id: 'sport', name: '30 minutes sports', icon: '✦' },
    { id: 'walk', name: 'One hour walk', icon: '✦' }
  ];

  const QUOTES = [
    { text: 'Discipline is choosing between what you want now and what you want most.', attr: 'Day 01' },
    { text: 'The body achieves what the mind believes.', attr: 'Day 02' },
    { text: 'Small daily improvements are the key to staggering long-term results.', attr: 'Day 03' },
    { text: 'You do not rise to the level of your goals. You fall to the level of your systems.', attr: 'Day 04' },
    { text: 'Motivation gets you going. Habit gets you there.', attr: 'Day 05' },
    { text: 'The pain of discipline weighs ounces. The pain of regret weighs tons.', attr: 'Day 06' },
    { text: 'A week in. The hardest part is behind you.', attr: 'Day 07' },
    { text: 'Your future self is watching you right now through memories.', attr: 'Day 08' },
    { text: 'Consistency is what transforms average into excellence.', attr: 'Day 09' },
    { text: 'A third of the way. Look how far you have come.', attr: 'Day 10' },
    { text: 'The cave you fear to enter holds the treasure you seek.', attr: 'Day 11' },
    { text: 'Strength does not come from what you can do. It comes from overcoming what you thought you could not.', attr: 'Day 12' },
    { text: 'Every action you take is a vote for the person you wish to become.', attr: 'Day 13' },
    { text: 'Two weeks. You are no longer trying. You are becoming.', attr: 'Day 14' },
    { text: 'Halfway. The middle is where the magic happens.', attr: 'Day 15' },
    { text: 'You do not need more time. You need more discipline.', attr: 'Day 16' },
    { text: 'The quality of your life is the quality of your habits.', attr: 'Day 17' },
    { text: 'Excellence is not an act, but a habit.', attr: 'Day 18' },
    { text: 'What you do every day matters more than what you do once in a while.', attr: 'Day 19' },
    { text: 'Twenty days. The version of you that started is gone.', attr: 'Day 20' },
    { text: 'Discipline equals freedom.', attr: 'Day 21' },
    { text: 'You are writing the story of who you are becoming.', attr: 'Day 22' },
    { text: 'The body you want is built by the choices you make today.', attr: 'Day 23' },
    { text: 'Strong people are not born. They are made by hard moments.', attr: 'Day 24' },
    { text: 'Twenty-five days. Five to go. This is yours.', attr: 'Day 25' },
    { text: 'The standard you walk past is the standard you accept.', attr: 'Day 26' },
    { text: 'Champions train when no one is watching.', attr: 'Day 27' },
    { text: 'Two more days. You have already won.', attr: 'Day 28' },
    { text: 'Tomorrow is the threshold. Cross it on your own terms.', attr: 'Day 29' },
    { text: 'Thirty. You did it. Now keep going.', attr: 'Day 30' }
  ];

  let state = {
    startDate: null,
    viewingDay: 1,
    days: {}
  };

  async function loadState() {
    try {
      const stored = await window.storage.get('tracker:state');
      if (stored && stored.value) {
        state = JSON.parse(stored.value);
      } else {
        // Initialize with tomorrow as Day 1
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(0, 0, 0, 0);
        state.startDate = tomorrow.toISOString();
        state.viewingDay = getCurrentDay();
        if (state.viewingDay < 1) state.viewingDay = 1;
        if (state.viewingDay > 30) state.viewingDay = 30;
        await saveState();
      }
    } catch (e) {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(0, 0, 0, 0);
      state.startDate = tomorrow.toISOString();
      state.viewingDay = 1;
    }
  }

  async function saveState() {
    try {
      await window.storage.set('tracker:state', JSON.stringify(state));
    } catch (e) {
      console.error('Save failed', e);
    }
  }

  function getCurrentDay() {
    if (!state.startDate) return 1;
    const start = new Date(state.startDate);
    const now = new Date();
    now.setHours(0,0,0,0);
    start.setHours(0,0,0,0);
    const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24)) + 1;
    return diff;
  }

  function getDayDate(dayNum) {
    if (!state.startDate) return null;
    const d = new Date(state.startDate);
    d.setDate(d.getDate() + dayNum - 1);
    return d;
  }

  function getDayData(dayNum) {
    return state.days[dayNum] || { habits: {}, metrics: {} };
  }

  function isPerfectDay(dayNum) {
    const data = getDayData(dayNum);
    const completed = HABITS.filter(h => data.habits[h.id]).length;
    // 4 or 5 out of 5 counts as a perfect day — one miss is forgiven
    return completed >= HABITS.length - 1;
  }

  function isFlawlessDay(dayNum) {
    const data = getDayData(dayNum);
    return HABITS.every(h => data.habits[h.id]);
  }

  function getHabitCount(dayNum) {
    const data = getDayData(dayNum);
    return HABITS.filter(h => data.habits[h.id]).length;
  }

  function getCurrentStreak() {
    const today = getCurrentDay();
    let streak = 0;
    for (let d = today; d >= 1; d--) {
      if (isPerfectDay(d)) streak++;
      else break;
    }
    return streak;
  }

  function calculateHabitStreak(habitId) {
    const today = getCurrentDay();
    let streak = 0;
    for (let d = today; d >= 1; d--) {
      const data = getDayData(d);
      if (data.habits[habitId]) streak++;
      else break;
    }
    return streak;
  }

  function render() {
    const dayNum = state.viewingDay;
    const data = getDayData(dayNum);
    const dayDate = getDayDate(dayNum);
    const currentDay = getCurrentDay();

    // Date display
    document.getElementById('currentDayNum').textContent = dayNum;
    if (dayDate) {
      const opts = { weekday: 'short', month: 'short', day: 'numeric' };
      document.getElementById('dateDisplay').textContent = dayDate.toLocaleDateString('en-US', opts);
    }

    // Progress ring (based on overall completion of all 30 days)
    let totalChecks = 0;
    for (let d = 1; d <= 30; d++) totalChecks += getHabitCount(d);
    const maxChecks = 30 * HABITS.length;
    const pct = totalChecks / maxChecks;
    const circumference = 238.76;
    document.getElementById('ringFg').style.strokeDashoffset = circumference * (1 - pct);

    // Stats
    let perfect = 0, flawless = 0;
    for (let d = 1; d <= 30; d++) {
      if (isPerfectDay(d)) perfect++;
      if (isFlawlessDay(d)) flawless++;
    }
    document.getElementById('perfectCount').textContent = perfect;
    document.getElementById('flawlessCount').textContent = flawless;
    document.getElementById('streakCount').textContent = getCurrentStreak() + ' days';
    document.getElementById('completionRate').textContent = Math.round(pct * 100) + '%';

    // Quote
    const q = QUOTES[dayNum - 1] || QUOTES[0];
    document.getElementById('quoteText').textContent = q.text;
    document.getElementById('quoteAttr').textContent = q.attr;

    // Habits
    const habitsEl = document.getElementById('habitsList');
    habitsEl.innerHTML = '';
    HABITS.forEach(h => {
      const done = !!data.habits[h.id];
      const streak = calculateHabitStreak(h.id);
      const el = document.createElement('div');
      el.className = 'habit' + (done ? ' done' : '');
      el.innerHTML = `
        <div class="checkbox"></div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-streak">${streak > 0 ? streak + ' day streak' : '—'}</div>
        </div>
        <div class="habit-icon">${h.icon}</div>
      `;
      el.addEventListener('click', () => toggleHabit(h.id));
      habitsEl.appendChild(el);
    });

    // Metrics
    document.querySelectorAll('.metric-input').forEach(input => {
      const key = input.dataset.metric;
      input.value = data.metrics[key] || '';
    });

    // Calendar
    const cal = document.getElementById('calGrid');
    cal.innerHTML = '';
    for (let d = 1; d <= 30; d++) {
      const cell = document.createElement('div');
      const count = getHabitCount(d);
      const isCurrent = d === dayNum;
      const isFuture = d > currentDay;
      const isPerfect = isPerfectDay(d);
      const isFlawless = isFlawlessDay(d);
      let cls = 'cal-day';
      if (isCurrent) cls += ' current';
      if (isFlawless) cls += ' flawless';
      else if (isPerfect) cls += ' perfect';
      else if (count >= 3) cls += ' partial';
      else if (count > 0) cls += ' done-some';
      if (isFuture && !isCurrent) cls += ' future';
      cell.className = cls;
      cell.innerHTML = `<div class="num">${d}</div><div class="score">${count}/${HABITS.length}</div>`;
      if (!isFuture || d <= 30) {
        cell.addEventListener('click', () => {
          state.viewingDay = d;
          render();
        });
      }
      cal.appendChild(cell);
    }

    // Nav buttons
    document.getElementById('prevDay').disabled = dayNum <= 1;
    document.getElementById('nextDay').disabled = dayNum >= 30;
  }

  async function toggleHabit(habitId) {
    const dayNum = state.viewingDay;
    if (!state.days[dayNum]) state.days[dayNum] = { habits: {}, metrics: {} };
    const wasDone = state.days[dayNum].habits[habitId];
    state.days[dayNum].habits[habitId] = !wasDone;
    await saveState();
    render();

    if (!wasDone) {
      const flawless = isFlawlessDay(dayNum);
      const justBecamePerfect = isPerfectDay(dayNum) && getDayData(dayNum).habits[habitId];
      if (flawless) {
        showToast('Flawless. Every single one.');
      } else if (justBecamePerfect) {
        showToast('A perfect day. Magnificent.');
      } else {
        const messages = [
          'One more vote for who you are becoming.',
          'That is what discipline looks like.',
          'Held the line. Well done.',
          'The compound effect, in motion.',
          'Another brick in the foundation.'
        ];
        showToast(messages[Math.floor(Math.random() * messages.length)]);
      }
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  // Metric inputs
  document.querySelectorAll('.metric-input').forEach(input => {
    input.addEventListener('change', async () => {
      const dayNum = state.viewingDay;
      if (!state.days[dayNum]) state.days[dayNum] = { habits: {}, metrics: {} };
      const key = input.dataset.metric;
      state.days[dayNum].metrics[key] = input.value;
      await saveState();
    });
  });

  // Nav
  document.getElementById('prevDay').addEventListener('click', () => {
    if (state.viewingDay > 1) { state.viewingDay--; render(); }
  });
  document.getElementById('nextDay').addEventListener('click', () => {
    if (state.viewingDay < 30) { state.viewingDay++; render(); }
  });

  // Reset
  document.getElementById('resetBtn').addEventListener('click', async () => {
    if (confirm('Reset everything? This will erase all your progress.')) {
      try {
        await window.storage.delete('tracker:state');
      } catch (e) {}
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(0, 0, 0, 0);
      state = { startDate: tomorrow.toISOString(), viewingDay: 1, days: {} };
      await saveState();
      render();
      showToast('A clean slate. Begin again.');
    }
  });

  // Init
  (async () => {
    await loadState();
    const today = getCurrentDay();
    if (today >= 1 && today <= 30) state.viewingDay = today;
    render();
  })();
</script>
</body>
</html>
